<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>Todo List</title>
  <style>
    body {
  font-family: Arial;
  background: #f4f4f4;
}

.container {
  width: 400px;
  margin: 50px auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

.input-area {
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 8px;
}

button {
  padding: 8px 12px;
  cursor: pointer;
}

li {
  display: flex;
  justify-content: space-between;

  margin-top: 10px;
  padding: 8px;
  background: #eee;
  border-radius: 5px;
}

.done {
  text-decoration: line-through;
  color: gray;
  
}
  </style>
</head>
<body>

  <div class="container">
    <h1>Todo List</h1>

    <div class="input-area">
      <input type="text" id="todoInput" placeholder="輸入待辦事項">
      <button onclick="addTodo()">新增</button>
    </div>

    <ul id="todoList"></ul>
  </div>

  <script>
    let todos = JSON.parse(localStorage.getItem("todos")) || [];
render();

// 新增
function addTodo() {
  const input = document.getElementById("todoInput");
  const text = input.value.trim();

  if (text === "") return;

  const todo = {
    id: Date.now(),
    text: text,
    done: false
  };

  todos.push(todo);
  input.value = "";

  render();
  localStorage.setItem("todos", JSON.stringify(todos));
}

// 刪除
function deleteTodo(id) {
  todos = todos.filter(todo => todo.id !== id);
  render();
  localStorage.setItem("todos", JSON.stringify(todos));
}

// 切換完成
function toggleTodo(id) {
  todos = todos.map(todo => {
    if (todo.id === id) {
      todo.done = !todo.done;
    }
    return todo;
  });

  render();
  localStorage.setItem("todos", JSON.stringify(todos));
}

// 畫面更新
function render() {
  const list = document.getElementById("todoList");
  list.innerHTML = "";

  todos.forEach(todo => {
    const li = document.createElement("li");

    li.innerHTML = `
      <span 
        onclick="toggleTodo(${todo.id})"
        class="${todo.done ? 'done' : ''}"
      >
        ${todo.text}
      </span>
      <button onclick="deleteTodo(${todo.id})">刪除</button>
    `;

    list.appendChild(li);
  });
}
  </script>
</body>
</html>
